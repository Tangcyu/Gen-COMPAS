##################################################
##################################################
#
# ABF calculation
#
# Deca-alanine
#
##################################################
##################################################


##################################################
# MD SECTION
##################################################

set outName          TMD.A
set inputname        ./TOP_files/


# TOPOLOGY


# FORCE FIELD

parmfile             ${inputname}trialanine.parm7


# INPUT FILES

#coordinates          minimize.coor
coordinates          ${inputname}A.pdb

## SIMULATION PARAMETERS                                  
# AMBER FF settings
amber               on

cutoff              9.0
pairlistdist        11.0
switching           off
exclude             scaled1-4
readexclusions      yes
1-4scaling          0.83333333

scnb                2.0
zeromomentum        on
ljcorrection        off
watermodel          tip3

nonbondedFreq       1 
fullElectFrequency  1 

hgroupcutoff        2.8


temperature          300.0


# OUTPUT FILES

binaryoutput         no  
binaryrestart        yes

outputname           ${outName}
restartname          ${outName}.restart


# DCD FILE

dcdFile              ${outName}.dcd


# FREQUENCY FOR DUMPING OUTPUT DATA

outputenergies       10000
outputtiming         10000
outputpressure       10000
restartfreq          10000 
XSTFreq              10000 
dcdFreq              20



# CONSTANT-T

langevin             on
langevintemp         300.0
langevindamping      1.0 


# MULTIPLE TIME-STEP PROPAGATOR

timestep             0.5


# SHAKE/RATTLE

rigidbonds           none


# PARALLELISM

stepspercycle        16
splitpatch           hydrogen
margin               2.0


# ABF SECTION

colvars              on
colvarsConfig        colvars.in

TMD             on
TMDk            100.0
TMDFile         output.pdb
TMDLastStep     20000
TMDOutputFreq   100

firsttimestep   0
run             20000
