timestep	0.5
set inputname ./TOP_files

structure	$inputname/alad.psf
coordinates	$inputname/A.pdb

binvelocities   TMD.A.vel
bincoordinates  TMD.A.coor
#temperature     300.0

outputname      Unbias.A

# DCD FILE

dcdFile         Unbias.A.dcd


# FREQUENCY FOR DUMPING OUTPUT DATA

outputenergies  100
outputtiming    100
outputpressure  100
restartfreq     1000 
XSTFreq         100
dcdFreq         100

margin		10.0
stepspercycle	20
paraTypeCharmm	on
parameters	$inputname/par_all22_prot.prm
exclude		scaled1-4
1-4scaling	1.0
switching 	on
switchdist      16.0
cutoff          18.0
pairlistdist    20.0

langevin	on
langevinDamping	1.0
langevinTemp    300.0
                
colvars         on
colvarsConfig   "colvars.in"

firsttimestep   0
run             200000
