set TOP_files        ./TOP_files

set state_label      B
set temp                310;


coordinates          $TOP_files/solvate.pdb                   
structure            $TOP_files/solvate.psf 

bincoordinates       $TOP_files/Eq.${state_label}.coor                          
binvelocities        $TOP_files/Eq.${state_label}.vel                            
ExtendedSystem       $TOP_files/Eq.${state_label}.xsc     

binaryoutput         yes                        
binaryrestart        yes    

outputname           TMD.$state_label

dcdUnitCell          yes                        
outputenergies       5000                       
outputtiming         5000                       
outputpressure       5000                       
restartfreq          5000                       
XSTFreq              5000                       
dcdFreq              5000  

# Force-Field Parameters
paraTypeCharmm          on;                 # We're using charmm type parameter file(s)
                                            # multiple definitions may be used but only one file per definition
set topo_dir            "/home/ctang/3.Simulations/9.bind_upon_change/0.system/toppar/"
parameters              $topo_dir/par_all36m_prot.prm
parameters              $topo_dir/par_all36_na.prm
parameters              $topo_dir/par_all36_carb.prm
parameters              $topo_dir/par_all36_lipid.prm
parameters              $topo_dir/par_all36_cgenff.prm
parameters              $topo_dir/par_interface.prm
parameters              $topo_dir/toppar_all36_moreions.str
parameters              $topo_dir/toppar_all36_nano_lig.str
parameters              $topo_dir/toppar_all36_nano_lig_patch.str
parameters              $topo_dir/toppar_all36_synthetic_polymer.str
parameters              $topo_dir/toppar_all36_synthetic_polymer_patch.str
parameters              $topo_dir/toppar_all36_polymer_solvent.str
parameters              $topo_dir/toppar_water_ions.str
parameters              $topo_dir/toppar_dum_noble_gases.str
parameters              $topo_dir/toppar_ions_won.str
parameters              $topo_dir/cam.str
parameters              $topo_dir/toppar_all36_prot_arg0.str
parameters              $topo_dir/toppar_all36_prot_c36m_d_aminoacids.str
parameters              $topo_dir/toppar_all36_prot_fluoro_alkanes.str
parameters              $topo_dir/toppar_all36_prot_heme.str
parameters              $topo_dir/toppar_all36_prot_na_combined.str
parameters              $topo_dir/toppar_all36_prot_retinol.str
parameters              $topo_dir/toppar_all36_prot_model.str
parameters              $topo_dir/toppar_all36_prot_modify_res.str
parameters              $topo_dir/toppar_all36_na_nad_ppi.str
parameters              $topo_dir/toppar_all36_na_rna_modified.str
parameters              $topo_dir/toppar_all36_lipid_sphingo.str
parameters              $topo_dir/toppar_all36_lipid_archaeal.str
parameters              $topo_dir/toppar_all36_lipid_bacterial.str
parameters              $topo_dir/toppar_all36_lipid_cardiolipin.str
parameters              $topo_dir/toppar_all36_lipid_cholesterol.str
parameters              $topo_dir/toppar_all36_lipid_dag.str
parameters              $topo_dir/toppar_all36_lipid_inositol.str
parameters              $topo_dir/toppar_all36_lipid_lnp.str
parameters              $topo_dir/toppar_all36_lipid_lps.str
parameters              $topo_dir/toppar_all36_lipid_mycobacterial.str
parameters              $topo_dir/toppar_all36_lipid_miscellaneous.str
parameters              $topo_dir/toppar_all36_lipid_model.str
parameters              $topo_dir/toppar_all36_lipid_prot.str
parameters              $topo_dir/toppar_all36_lipid_tag.str
