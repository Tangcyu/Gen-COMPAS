##DESCRIPTION                                         ##
#############################################################
#
# Mouse 5HT3 in 3:1:1 POPC:POPA:Cholesterol with vortioxetine (resname CCE), 150 mM NaCl
# Box 122x122x180
# starting from cryoEM m5HT3 in complex with vortioxetine
# vtx-m5ht3-det-P17J6.pdb
# Summer 2021 
#
# with hydrogen mass repartitioning
#
#############################################################
## ADJUSTABLE PARAMETERS                                   ##
#############################################################

structure       ./input.psf 
coordinates     ./input.pdb

set inputname   ./TMD.B
set TOP_files   /home/ctang/1.Ongoing/1.Diffusion.Additional/5.Pen_Channel/TOP_files     


set restartname    Unbiased.B 
set outputname     Unbiased.B 

bincoordinates         $inputname.coor
# binvelocities          $inputname.vel
extendedSystem         $inputname.xsc

restartname         $restartname
binaryrestart       no 
outputTiming        500

set temperature     310

temperature         $temperature

#############################################################
## SIMULATION PARAMETERS                                   ##
#############################################################

# Input
paraTypeCharmm      on

parameters            $TOP_files/toppar/par_all36_na.prm
parameters            $TOP_files/toppar/par_all36_carb.prm
parameters            $TOP_files/toppar/par_all36_lipid.prm
parameters            $TOP_files/toppar/par_all36_cgenff.prm
parameters            $TOP_files/toppar/toppar_water_ions.str
parameters            $TOP_files/toppar/toppar_all36_carb_glycopeptide.str
parameters            $TOP_files/toppar/par_all36m_prot.prm
parameters            $TOP_files/toppar/toppar_all36_lipid_inositol.str
parameters            $TOP_files/toppar/toppar_all36_lipid_miscellaneous.str
parameters            $TOP_files/toppar/toppar_all36_lipid_sphingo.str
parameters            $TOP_files/toppar/toppar_all36_lipid_lps.str
parameters            $TOP_files/toppar/toppar_all36_lipid_cardiolipin.str
parameters            $TOP_files/toppar/toppar_all36_lipid_model.str
parameters            $TOP_files/toppar/toppar_all36_carb_glycolipid.str
parameters            $TOP_files/toppar/ACH.str

# Force-Field Parameters
exclude             scaled1-4
1-4scaling          1.0
cutoff              12.0
switching           on
switchdist          10.0
pairlistdist        14.0

# Integrator Parameters
splitpatch          hydrogen
hgroupcutoff        2.8
timestep            4.0
nonbondedFreq       1
fullElectFrequency  2
rigidBonds          all
rigidtolerance      0.00001
rigiditerations     400

#stepsPerCycle     20
#pairListsPerCycle 10
#margin            8

# GPU
#GPUResident         on
usePMECUDA              on
#SOAintegrate            off
CUDASOAintegrate        on 


#stochRescale            on
#stochRescaleTemp        $temperature
#stochRescalePeriod      1.0

# Constant Temperature Control
langevin            on   
langevinDamping     1    
langevinTemp        $temperature
langevinHydrogen    off  

# Periodic Boundary Conditions

wrapWater           on
wrapAll             off

PME                 yes
PMEGridSpacing      1.2

# Constant Pressure Control (variable volume)

langevinPiston        on
langevinpistontarget  1.01325 ;#  in bar -> 1 atm
langevinpistonperiod  600
langevinpistondecay   500
langevinpistontemp    $temperature

useGroupPressure      yes  # needed for rigidBonds
useFlexibleCell       yes  # membrane simulation
useConstantArea       no  
useConstantRatio      yes

# Output
outputName           $outputname
restartfreq          5000 
dcdfreq              5000   
xstFreq              5000   
outputEnergies       5000
outputPressure       5000   
DCDunitcell          yes

dcdSelection           yes
dcdSelectionInputfile  soluteonly index.noh.pdb
dcdSelectionfreq       soluteonly 25
dcdSelectionfile       soluteonly $outputname.noh.dcd


colvars                 on
colvarsConfig           colvars.in
 
run                  500000


